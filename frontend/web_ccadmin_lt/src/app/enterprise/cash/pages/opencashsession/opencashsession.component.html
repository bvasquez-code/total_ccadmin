<div role="main" class="main-content">

    <div class="page-content container container-plus">
        <div class="card acard mt-2 mt-lg-3">

            <div class="card-header">
                <h3 class="card-title text-125 text-primary-d2">
                    <i class="far fa-edit text-dark-l3 mr-1"></i>
                    Aperturar Caja
                </h3>
            </div>

            <div class="card-body px-3 pb-1">
                <form class="mt-lg-3" autocomplete="off">

                    <div class="form-group row">
                        <div class="col-sm-3 col-form-label text-sm-right pr-0">
                            <label class="mb-0">Caja</label>
                        </div>
                        <div class="col-sm-9">
                            <input type="text" class="form-control col-sm-8 col-md-6" [(ngModel)]="req.RegisterCod"
                                name="RegisterCod" readonly>
                        </div>
                    </div>

                    <div class="form-group row">
                        <div class="col-sm-3 col-form-label text-sm-right pr-0">
                            <label class="mb-0">Tienda</label>
                        </div>
                        <div class="col-sm-9">
                            <input type="text" class="form-control col-sm-8 col-md-6" [(ngModel)]="req.StoreCod"
                                name="StoreCod" readonly>
                        </div>
                    </div>

                    <div class="form-group row">
                        <div class="col-sm-3 col-form-label text-sm-right pr-0">
                            <label class="mb-0">Moneda</label>
                        </div>
                        <div class="col-sm-9">
                            <select class="form-control col-sm-8 col-md-6" [(ngModel)]="req.CurrencyCod"
                                name="CurrencyCod">
                                <option value="PEN">PEN</option>
                                <option value="USD">USD</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group row">
                        <div class="col-sm-3 col-form-label text-sm-right pr-0">
                            <label class="mb-0">Fondo inicial</label>
                        </div>
                        <div class="col-sm-9">
                            <input type="number" class="form-control col-sm-8 col-md-6"
                                [(ngModel)]="req.OpeningFloatAmount" name="OpeningFloatAmount">
                        </div>
                    </div>

                    <div class="form-group row">
                        <div class="col-sm-3 col-form-label text-sm-right pr-0">
                            <label class="mb-0">Comentario</label>
                        </div>
                        <div class="col-sm-9">
                            <input type="text" class="form-control col-sm-8 col-md-6" [(ngModel)]="req.Commenter"
                                name="Commenter">
                        </div>
                    </div>

                    <div class="mt-5 border-t-1 bgc-secondary-l4 brc-secondary-l2 py-35 mx-n25">
                        <div class="offset-md-3 col-md-9 text-nowrap">
                            <a class="btn btn-success btn-bold px-4" type="button" (click)="open()">
                                <i class="fa fa-check mr-1"></i>
                                Aperturar
                            </a>

                            <a class="btn btn-outline-lightgrey btn-bgc-white btn-bold ml-2 px-4" type="reset"
                                href="/enterprise/cash/pages/listcashregister">
                                <i class="fa fa-undo mr-1"></i>
                                Volver
                            </a>
                        </div>
                    </div>

                </form>
            </div>

        </div>
    </div>
</div>
