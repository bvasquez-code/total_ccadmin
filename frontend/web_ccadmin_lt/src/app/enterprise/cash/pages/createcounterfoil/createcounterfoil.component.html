<div role="main" class="main-content">

    <div class="page-content container container-plus">
        <div class="card acard mt-2 mt-lg-3">

            <div class="card-header">
                <h3 class="card-title text-125 text-primary-d2">
                    <i class="far fa-edit text-dark-l3 mr-1"></i>
                    {{ CounterfoilCod !== '' ? 'Editar talonario' : 'Registrar talonario' }}
                </h3>
            </div>

            <div class="card-body px-3 pb-1">
                <form class="mt-lg-3" autocomplete="off">

                    <div class="form-group row">
                        <div class="col-sm-3 col-form-label text-sm-right pr-0">
                            <label class="mb-0">Código talonario</label>
                        </div>
                        <div class="col-sm-9">
                            <input type="text" class="form-control col-sm-8 col-md-6"
                                [(ngModel)]="register.counterfoil.CounterfoilCod" name="CounterfoilCod" readonly>
                            <small class="text-muted">
                                Se genera automáticamente: Tipo documento (2) + Serie (4)
                            </small>
                        </div>
                    </div>

                    <div class="form-group row">
                        <div class="col-sm-3 col-form-label text-sm-right pr-0">
                            <label class="mb-0">Tienda</label>
                        </div>
                        <div class="col-sm-9">
                            <input type="text" class="form-control col-sm-8 col-md-6" [(ngModel)]="Store.StoreCod"
                                name="StoreCod" readonly>
                        </div>
                    </div>

                    <div class="form-group row">
                        <div class="col-sm-3 col-form-label text-sm-right pr-0">
                            <label class="mb-0">Tipo de documento</label>
                        </div>
                        <div class="col-sm-9">
                            <select class="form-control col-sm-8 col-md-6"
                                [(ngModel)]="register.counterfoil.DocumentType" name="DocumentType"
                                (change)="buildCounterfoilCod()" [disabled]="CounterfoilCod!==''">
                                <option value="">[--SELECCIONAR--]</option>
                                <option [value]="d.Code" *ngFor="let d of DocumentTypeList">
                                    {{ d.Description }}
                                </option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group row">
                        <div class="col-sm-3 col-form-label text-sm-right pr-0">
                            <label class="mb-0">Serie</label>
                        </div>
                        <div class="col-sm-9">
                            <input type="text" class="form-control col-sm-8 col-md-6"
                                [(ngModel)]="register.counterfoil.Series" name="Series" maxlength="4"
                                (keyup)="buildCounterfoilCod()" [readonly]="CounterfoilCod!==''">
                        </div>
                    </div>

                    <div class="form-group row">
                        <div class="col-sm-3 col-form-label text-sm-right pr-0">
                            <label class="mb-0">Correlativo</label>
                        </div>
                        <div class="col-sm-9">
                            <input type="number" class="form-control col-sm-8 col-md-6"
                                [(ngModel)]="register.counterfoil.Correlative" name="Correlative">
                        </div>
                    </div>

                    <div class="form-group row">
                        <div class="col-sm-3 col-form-label text-sm-right pr-0">
                            <label class="mb-0">¿Automático?</label>
                        </div>
                        <div class="col-sm-9">
                            <select class="form-control col-sm-8 col-md-6"
                                [(ngModel)]="register.counterfoil.IsAutomatic" name="IsAutomatic">
                                <option value="S">Sí</option>
                                <option value="N">No</option>
                            </select>
                        </div>
                    </div>

                    <!-- GroupDocument select fijo -->
                    <div class="form-group row">
                        <div class="col-sm-3 col-form-label text-sm-right pr-0">
                            <label class="mb-0">Grupo de documento</label>
                        </div>
                        <div class="col-sm-9">
                            <select class="form-control col-sm-8 col-md-6"
                                [(ngModel)]="register.counterfoil.GroupDocument" name="GroupDocument">
                                <option value="">[--SELECCIONAR--]</option>
                                <option [value]="g.Code" *ngFor="let g of GroupDocumentOptions">
                                    {{ g.Description }}
                                </option>
                            </select>
                            <small class="text-muted">
                                Sirve para separar correlativos por familia (Factura/Boleta/Guía/Sin grupo)
                            </small>
                        </div>
                    </div>

                    <div class="mt-5 border-t-1 bgc-secondary-l4 brc-secondary-l2 py-35 mx-n25">
                        <div class="offset-md-3 col-md-9 text-nowrap">

                            <a class="btn btn-info btn-bold px-4" type="button" (click)="save()">
                                <i class="fa fa-check mr-1"></i>
                                Guardar
                            </a>

                            <a class="btn btn-outline-lightgrey btn-bgc-white btn-bold ml-2 px-4" type="reset"
                                href="/enterprise/cash/pages/listcounterfoil">
                                <i class="fa fa-undo mr-1"></i>
                                Volver
                            </a>

                        </div>
                    </div>

                </form>
            </div>

        </div>
    </div>
</div>
