<div role="main" class="main-content">

    <div class="page-content container container-plus">
        <div class="card acard mt-2 mt-lg-3">

            <div class="card-header">
                <h3 class="card-title text-125 text-primary-d2">
                    <i class="far fa-edit text-dark-l3 mr-1"></i>
                    {{ RegisterCod !== '' ? 'Editar Caja' : 'Registrar Caja' }}
                </h3>
            </div>

            <div class="card-body px-3 pb-1">
                <form class="mt-lg-3" autocomplete="off">

                    <div class="form-group row">
                        <div class="col-sm-3 col-form-label text-sm-right pr-0">
                            <label class="mb-0">Código</label>
                        </div>
                        <div class="col-sm-9">
                            <input type="text" class="form-control col-sm-8 col-md-6"
                                [(ngModel)]="cashRegister.RegisterCod" name="RegisterCod" [readonly]="true">
                        </div>
                    </div>

                    <div class="form-group row">
                        <div class="col-sm-3 col-form-label text-sm-right pr-0">
                            <label class="mb-0">Tienda</label>
                        </div>
                        <div class="col-sm-9">
                            <input type="text" class="form-control col-sm-8 col-md-6"
                                [(ngModel)]="cashRegister.StoreCod" name="StoreCod" [readonly]="true">
                        </div>
                    </div>

                    <div class="form-group row">
                        <div class="col-sm-3 col-form-label text-sm-right pr-0">
                            <label class="mb-0">Nombre</label>
                        </div>
                        <div class="col-sm-9">
                            <input type="text" class="form-control col-sm-8 col-md-6" [(ngModel)]="cashRegister.Name"
                                name="Name">
                        </div>
                    </div>

                    <div class="form-group row">
                        <div class="col-sm-3 col-form-label text-sm-right pr-0">
                            <label class="mb-0">Descripción</label>
                        </div>
                        <div class="col-sm-9">
                            <input type="text" class="form-control col-sm-8 col-md-6"
                                [(ngModel)]="cashRegister.Description" name="Description">
                        </div>
                    </div>

                    <div class="form-group row">
                        <div class="col-sm-3 col-form-label text-sm-right pr-0">
                            <label class="mb-0">N° Serie</label>
                        </div>
                        <div class="col-sm-9">
                            <input type="text" class="form-control col-sm-8 col-md-6"
                                [(ngModel)]="cashRegister.SerialNumber" name="SerialNumber">
                        </div>
                    </div>

                    <div class="mt-5 border-t-1 bgc-secondary-l4 brc-secondary-l2 py-35 mx-n25">
                        <div class="offset-md-3 col-md-9 text-nowrap">
                            <a class="btn btn-info btn-bold px-4" type="button" (click)="save()">
                                <i class="fa fa-check mr-1"></i>
                                Guardar
                            </a>

                            <a class="btn btn-outline-lightgrey btn-bgc-white btn-bold ml-2 px-4" type="reset"
                                href="/enterprise/cash/pages/listcashregister">
                                <i class="fa fa-undo mr-1"></i>
                                Volver
                            </a>
                        </div>
                    </div>

                </form>
            </div>

        </div>
    </div>
</div>
