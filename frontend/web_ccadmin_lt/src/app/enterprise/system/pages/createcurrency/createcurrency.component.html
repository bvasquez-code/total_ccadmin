<div role="main" class="main-content">

    <div class="page-content container container-plus">
        <div class="card acard mt-2 mt-lg-3">
            <div class="card-header">
                <h3 class="card-title text-125 text-primary-d2">
                    <i class="far fa-edit text-dark-l3 mr-1"></i>
                    {{ CurrencyCod !== '' ? 'Editar moneda' : 'Registrar moneda' }}
                </h3>
            </div>

            <div class="card-body px-3 pb-1">
                <form class="mt-lg-3" autocomplete="off">

                    <div class="form-group row">
                        <div class="col-sm-3 col-form-label text-sm-right pr-0">
                            <label class="mb-0">Codigo</label>
                        </div>

                        <div class="col-sm-9">
                            <input type="text"
                                [readonly]="txtCurrencyCodReadonly"
                                [maxLength]="5"
                                (keypress)="validateKeypress($event,'txtCurrencyCod')"
                                class="form-control col-sm-8 col-md-6"
                                [(ngModel)]="currency.CurrencyCod"
                                name="CurrencyCod">
                        </div>
                    </div>

                    <div class="form-group row">
                        <div class="col-sm-3 col-form-label text-sm-right pr-0">
                            <label class="mb-0">Abreviatura</label>
                        </div>

                        <div class="col-sm-9">
                            <input type="text"
                                [maxLength]="8"
                                (keypress)="validateKeypress($event,'txtCurrencyAbbr')"
                                class="form-control col-sm-8 col-md-6"
                                [(ngModel)]="currency.CurrencyAbbr"
                                name="CurrencyAbbr">
                        </div>
                    </div>

                    <div class="form-group row">
                        <div class="col-sm-3 col-form-label text-sm-right pr-0">
                            <label class="mb-0">Simbolo</label>
                        </div>

                        <div class="col-sm-9">
                            <input type="text"
                                [maxLength]="5"
                                class="form-control col-sm-8 col-md-6"
                                [(ngModel)]="currency.CurrencySymbol"
                                name="CurrencySymbol">
                        </div>
                    </div>

                    <div class="form-group row">
                        <div class="col-sm-3 col-form-label text-sm-right pr-0">
                            <label class="mb-0">Nombre</label>
                        </div>

                        <div class="col-sm-9">
                            <input type="text"
                                [maxLength]="32"
                                class="form-control col-sm-8 col-md-6"
                                [(ngModel)]="currency.CurrencyName"
                                name="CurrencyName">
                        </div>
                    </div>

                    <div class="form-group row">
                        <div class="col-sm-3 col-form-label text-sm-right pr-0">
                            <label class="mb-0">Descripcion</label>
                        </div>

                        <div class="col-sm-9">
                            <input type="text"
                                [maxLength]="128"
                                class="form-control col-sm-8 col-md-6"
                                [(ngModel)]="currency.CurrencyDesc"
                                name="CurrencyDesc">
                        </div>
                    </div>

                    <div class="form-group row">
                        <div class="col-sm-3 col-form-label text-sm-right pr-0">
                            <label class="mb-0">Tipo de cambio</label>
                        </div>

                        <div class="col-sm-9">
                            <input type="number"
                                min="0"
                                step="0.0001"
                                class="form-control col-sm-8 col-md-6"
                                [(ngModel)]="currency.NumExchangevalue"
                                name="NumExchangevalue">
                        </div>
                    </div>

                    <div class="form-group row">
                        <div class="col-sm-3 col-form-label text-sm-right pr-0">
                            <label class="mb-0">Moneda principal</label>
                        </div>

                        <div class="col-sm-9">
                            <select class="form-control col-sm-8 col-md-6"
                                [(ngModel)]="currency.IsCurrencySystem"
                                name="IsCurrencySystem">
                                <option value="N">No</option>
                                <option value="S">Si</option>
                            </select>
                        </div>
                    </div>

                    <div class="mt-5 border-t-1 bgc-secondary-l4 brc-secondary-l2 py-35 mx-n25">
                        <div class="offset-md-3 col-md-9 text-nowrap">
                            <a
                                class="btn btn-info btn-bold px-4"
                                type="button"
                                (click)="Save()">
                                <i class="fa fa-check mr-1"></i>
                                Guardar
                            </a>

                            <a class="btn btn-outline-lightgrey btn-bgc-white btn-bold ml-2 px-4"
                                type="reset"
                                href="/enterprise/system/pages/listcurrency">
                                <i class="fa fa-undo mr-1"></i>
                                Volver
                            </a>
                        </div>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>
