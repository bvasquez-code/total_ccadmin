<div role="main" class="main-content">

    <div class="page-content container container-plus">
        <div class="card acard mt-2 mt-lg-3">
            <div class="card-header">
                <h3 class="card-title text-125 text-primary-d2">
                    <i class="far fa-edit text-dark-l3 mr-1"></i>
                    {{ StoreCod !== '' ? 'Editar Tienda' : 'Registrar Tienda' }}
                </h3>
            </div>

            <div class="card-body px-3 pb-1">
                <form class="mt-lg-3" autocomplete="off">

                    <div class="form-group row">
                        <div class="col-sm-3 col-form-label text-sm-right pr-0">
                            <label class="mb-0">
                                Codigo
                            </label>
                        </div>

                        <div class="col-sm-9">
                            <input type="text"
                                [readonly]="txtStoreCodreadonly"
                                [maxLength]="4"
                                (keypress)="validateKeypress($event,'txtStoreCod')"
                                class="form-control col-sm-8 col-md-6"
                                [(ngModel)]="Store.StoreCod"
                                name="StoreCod">
                        </div>
                    </div>

                    <div class="form-group row">
                        <div class="col-sm-3 col-form-label text-sm-right pr-0">
                            <label class="mb-0">
                                Nombre
                            </label>
                        </div>

                        <div class="col-sm-9">
                            <input type="text"
                                [maxLength]="32"
                                class="form-control col-sm-8 col-md-6"
                                [(ngModel)]="Store.Name"
                                name="Name">
                        </div>
                    </div>

                    <div class="form-group row">
                        <div class="col-sm-3 col-form-label text-sm-right pr-0">
                            <label class="mb-0">
                                Descripcion
                            </label>
                        </div>

                        <div class="col-sm-9">
                            <input type="text"
                                [maxLength]="128"
                                class="form-control col-sm-8 col-md-6"
                                [(ngModel)]="Store.Description"
                                name="Description">
                        </div>
                    </div>

                    <div class="form-group row">
                        <div class="col-sm-3 col-form-label text-sm-right pr-0">
                            <label class="mb-0">
                                Direccion
                            </label>
                        </div>

                        <div class="col-sm-9">
                            <input type="text"
                                [maxLength]="128"
                                class="form-control col-sm-8 col-md-6"
                                [(ngModel)]="Store.Address"
                                name="Address">
                        </div>
                    </div>

                    <div class="form-group row">
                        <div class="col-sm-3 col-form-label text-sm-right pr-0">
                            <label class="mb-0">
                                Ubigeo
                            </label>
                        </div>

                        <div class="col-sm-9">
                            <input type="text"
                                [maxLength]="12"
                                (keypress)="validateKeypress($event,'txtUbigeoCod')"
                                class="form-control col-sm-8 col-md-6"
                                [(ngModel)]="Store.UbigeoCod"
                                name="UbigeoCod">
                        </div>
                    </div>

                    <div class="mt-5 border-t-1 bgc-secondary-l4 brc-secondary-l2 py-35 mx-n25">
                        <div class="offset-md-3 col-md-9 text-nowrap">
                            <a
                                class="btn btn-info btn-bold px-4"
                                type="button"
                                (click)="Save()">
                                <i class="fa fa-check mr-1"></i>
                                Guardar
                            </a>

                            <a class="btn btn-outline-lightgrey btn-bgc-white btn-bold ml-2 px-4"
                                type="reset"
                                href="/enterprise/store/pages/liststore">
                                <i class="fa fa-undo mr-1"></i>
                                Volver
                            </a>
                        </div>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>
