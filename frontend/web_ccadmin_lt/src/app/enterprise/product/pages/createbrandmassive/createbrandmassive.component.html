<div role="main" class="main-content">
    <div class="page-content container container-plus">
        <div class="card-header">
            <h3 class="card-title text-125 text-primary-d2">
                <i class="far fa-file-excel text-dark-l3 mr-1"></i>
                Carga Masiva de Marcas
            </h3>
        </div>

        <div class="row mt-3">
            <div class="col-12">
                <div class="card dcard">
                    <div class="card-body px-1 px-md-3">
                        
                        <div class="d-flex justify-content-between flex-column flex-sm-row mb-3 px-2 px-sm-0">
                            <div class="mb-2 mb-sm-0">
                                <a class="btn px-4 btn-light-secondary mb-1" href="enterprise/product/pages/listBrand">
                                    <i class="fa fa-arrow-left mr-1"></i> Volver
                                </a>
                                <button class="btn px-4 btn-primary mb-1 ml-2" (click)="exportExcel()" [disabled]="!uploadFormat">
                                    <i class="fa fa-download mr-1"></i> Exportar Formato
                                </button>
                                <label class="btn px-4 btn-success mb-1 ml-2" style="cursor: pointer;">
                                    <i class="fa fa-upload mr-1"></i> Subir Excel
                                    <input type="file" (change)="uploadExcel($event)" multiple="false" accept=".xlsx, .xls" style="display: none;" />
                                </label>
                            </div>
                            
                            <div class="mb-2 mb-sm-0">
                                <button *ngIf="failedProducts.length > 0" class="btn px-4 btn-danger mb-1 mr-2" (click)="exportFailedProducts()">
                                    <i class="fa fa-download mr-1"></i> Exportar Errores ({{failedProducts.length}})
                                </button>
                                <button *ngIf="previewList.length > 0" class="btn px-4 btn-warning mb-1 text-white" (click)="saveMassive()">
                                    <i class="fa fa-save mr-1"></i> Confirmar Carga Masiva
                                </button>
                            </div>
                        </div>

                        <!-- PREVIEW TABLE -->
                        <div class="table-responsive mt-4" *ngIf="previewList.length > 0">
                            <h5 class="text-secondary-d1 mb-3">Previsualización de datos ({{previewList.length}} registros)</h5>
                            <table class="table table-bordered table-striped table-hover">
                                <thead class="bg-light">
                                    <tr>
                                        <th *ngFor="let label of uploadFormat?.labels">{{label}}</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr *ngFor="let row of excelDataPreview">
                                        <td *ngFor="let header of uploadFormat?.headers">{{row[header]}}</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <div class="alert alert-info mt-4" *ngIf="previewList.length === 0">
                            Sube un archivo Excel usando el formato predeterminado para visualizar y confirmar la carga.
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
